name: Infrastructure Drift Detection

on:
  push:
    branches:
      - main
      - feature/*
  schedule:
    - cron: '*/2 * * * *' 
  workflow_dispatch:      

jobs:
  detect-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.2.0

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: terraform-drift-detector:latest

      # Example: Configure AWS Credentials for the CloudFetcher
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Example: Pull remote state (if not using local state)
      # - name: Fetch Terraform State from S3
      #   run: aws s3 cp s3://my-terraform-states/prod.tfstate ./terraform.tfstate

      - name: Initialize Terraform with S3 Backend
        run: |
          cd terraform
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ secrets.TF_STATE_KEY }}" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Pull Remote State Locally and validate JSON
        run: |
          set -e
          cd terraform
          terraform state pull | jq . > terraform.tfstate
          echo "Pulled remote state to test/terraform.tfstate"

      - name: Run Drift Scan
        run: |
          docker run --rm \
            -v "$PWD/terraform:/app/terraform" \
            -v "$PWD/output:/app/output" \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            terraform-drift-detector:latest scan --format all

      - name: Archive Drift Reports
        uses: actions/upload-artifact@v4
        with:
          name: drift-reports
          path: |
            output/drift_report.json
            output/drift_dashboard.html